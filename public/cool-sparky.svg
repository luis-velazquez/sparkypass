<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Sparky the electrician mascot - cool with sunglasses">
  <defs>
    <filter id="sparky-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="lens-shine" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Face -->
  <circle cx="50" cy="58" r="24" fill="#FBBF24" />
  <!-- Cheeks -->
  <circle cx="35" cy="63" r="4" fill="#F59E0B" opacity="0.4" />
  <circle cx="65" cy="63" r="4" fill="#F59E0B" opacity="0.4" />

  <!-- Sunglasses -->
  <!-- Bridge -->
  <rect x="44" y="51" width="12" height="3" rx="1" fill="#292524" />
  <!-- Left lens -->
  <rect x="28" y="48" width="18" height="12" rx="4" fill="#292524" />
  <!-- Right lens -->
  <rect x="54" y="48" width="18" height="12" rx="4" fill="#292524" />
  <!-- Left arm -->
  <line x1="28" y1="52" x2="22" y2="50" stroke="#292524" stroke-width="2" stroke-linecap="round" />
  <!-- Right arm -->
  <line x1="72" y1="52" x2="78" y2="50" stroke="#292524" stroke-width="2" stroke-linecap="round" />
  <!-- Lens shine - left -->
  <rect x="32" y="50" width="6" height="2" rx="1" fill="white" opacity="0.25" filter="url(#lens-shine)" />
  <!-- Lens shine - right -->
  <rect x="58" y="50" width="6" height="2" rx="1" fill="white" opacity="0.25" filter="url(#lens-shine)" />
  <!-- Green reflection in lenses -->
  <circle cx="37" cy="55" r="2" fill="#A3FF00" opacity="0.15" />
  <circle cx="63" cy="55" r="2" fill="#A3FF00" opacity="0.15" />

  <!-- Eyebrows - relaxed and confident, peeking above glasses -->
  <path d="M30 46 Q37 43 44 46" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round" />
  <path d="M56 46 Q63 43 70 46" stroke="#92400E" stroke-width="2" fill="none" stroke-linecap="round" />

  <!-- Mouth - confident smirk, one side higher -->
  <path d="M38 68 Q46 74 54 72 Q60 70 62 66" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Hard Hat -->
  <ellipse cx="50" cy="28" rx="26" ry="12" fill="#F59E0B" />
  <rect x="26" y="24" width="48" height="14" rx="2" fill="#F59E0B" />
  <rect x="22" y="36" width="56" height="6" rx="2" fill="#D97706" />
  <ellipse cx="50" cy="26" rx="16" ry="6" fill="#FCD34D" opacity="0.5" />

  <!-- Lightning bolt badge on hat -->
  <path d="M52 20 L48 28 L52 28 L48 36 L56 26 L52 26 L56 20 Z" fill="#A3FF00"
    filter="url(#sparky-glow)" />

  <!-- Sparkle accents for "cool" factor -->
  <path d="M14 52 L15 49 L16 52 L15 53 Z" fill="#FCD34D" opacity="0.6" />
  <path d="M86 48 L87 45 L88 48 L87 49 Z" fill="#A3FF00" opacity="0.6" />
</svg>
