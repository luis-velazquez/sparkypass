<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Sparky the electrician mascot - sleeping">
  <defs>
    <filter id="sparky-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Sleep bubble -->
  <circle cx="78" cy="42" r="2.5" fill="#D6D3D1" opacity="0.5" />
  <circle cx="84" cy="34" r="3.5" fill="#D6D3D1" opacity="0.5" />
  <!-- Large sleep bubble with Z -->
  <ellipse cx="88" cy="20" rx="8" ry="7" fill="#D6D3D1" opacity="0.4" />
  <text x="84" y="24" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#78716C" opacity="0.8">Z</text>

  <!-- Floating Z's -->
  <text x="72" y="14" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#A8A29E" opacity="0.5">z</text>
  <text x="80" y="6" font-family="Arial, sans-serif" font-size="6" font-weight="bold" fill="#A8A29E" opacity="0.4">z</text>

  <!-- Face -->
  <circle cx="50" cy="58" r="24" fill="#FBBF24" />
  <!-- Cheeks - soft and relaxed -->
  <circle cx="35" cy="63" r="4.5" fill="#F59E0B" opacity="0.35" />
  <circle cx="65" cy="63" r="4.5" fill="#F59E0B" opacity="0.35" />

  <!-- Eyes - closed sleeping lines -->
  <path d="M34 56 Q40 60 46 56" stroke="#292524" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M54 56 Q60 60 66 56" stroke="#292524" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Eyebrows - relaxed, slightly droopy -->
  <path d="M34 51 Q40 49 46 51" stroke="#92400E" stroke-width="1.8" fill="none" stroke-linecap="round" />
  <path d="M54 51 Q60 49 66 51" stroke="#92400E" stroke-width="1.8" fill="none" stroke-linecap="round" />

  <!-- Mouth - small open snoring circle -->
  <ellipse cx="50" cy="70" rx="4" ry="5" fill="#92400E" />
  <ellipse cx="50" cy="69.5" rx="2.5" ry="3" fill="#7C2D12" />

  <!-- Drool drop -->
  <path d="M54 72 Q55 76 54 80 Q52 77 54 72 Z" fill="#60A5FA" opacity="0.4" />

  <!-- Hard Hat - tilted forward like nodding off -->
  <g transform="rotate(8, 50, 30)">
    <ellipse cx="50" cy="28" rx="26" ry="12" fill="#F59E0B" />
    <rect x="26" y="24" width="48" height="14" rx="2" fill="#F59E0B" />
    <rect x="22" y="36" width="56" height="6" rx="2" fill="#D97706" />
    <ellipse cx="50" cy="26" rx="16" ry="6" fill="#FCD34D" opacity="0.5" />

    <!-- Lightning bolt badge on hat - dim -->
    <path d="M52 20 L48 28 L52 28 L48 36 L56 26 L52 26 L56 20 Z" fill="#A3FF00" opacity="0.4"
      filter="url(#sparky-glow)" />
  </g>
</svg>
