<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-label="Sparky the electrician mascot - on fire">
  <defs>
    <filter id="sparky-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="fire-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Outer fire - large flames behind head -->
  <path d="M20 50 Q18 30 30 20 Q28 35 35 25 Q30 40 38 18 Q36 32 44 10 Q42 28 50 5 Q52 20 56 10 Q54 30 62 18 Q58 35 65 25 Q62 38 70 20 Q72 30 80 50" fill="#EF4444" opacity="0.3" filter="url(#fire-glow)" />
  <!-- Middle fire -->
  <path d="M25 55 Q24 38 34 28 Q32 40 40 22 Q38 36 46 14 Q44 30 50 10 Q52 26 54 14 Q52 32 60 22 Q56 38 66 28 Q64 40 75 55" fill="#F97316" opacity="0.5" filter="url(#fire-glow)" />
  <!-- Inner fire - bright yellow -->
  <path d="M30 52 Q30 40 38 32 Q36 42 44 24 Q42 36 50 18 Q52 32 56 24 Q54 40 62 32 Q60 42 70 52" fill="#FCD34D" opacity="0.4" filter="url(#fire-glow)" />

  <!-- Face -->
  <circle cx="50" cy="58" r="24" fill="#FBBF24" />
  <!-- Cheeks - fiery red blush -->
  <circle cx="34" cy="63" r="5" fill="#EF4444" opacity="0.3" />
  <circle cx="66" cy="63" r="5" fill="#EF4444" opacity="0.3" />

  <!-- Eyes - intense, narrowed -->
  <ellipse cx="40" cy="54" rx="5.5" ry="5" fill="white" />
  <ellipse cx="60" cy="54" rx="5.5" ry="5" fill="white" />
  <!-- Fire-colored pupils -->
  <circle cx="41" cy="54.5" r="3" fill="#292524" />
  <circle cx="61" cy="54.5" r="3" fill="#292524" />
  <!-- Orange-red reflection in eyes -->
  <circle cx="42" cy="53" r="1.3" fill="#F97316" />
  <circle cx="62" cy="53" r="1.3" fill="#F97316" />

  <!-- Eyebrows - intense, angled sharply -->
  <path d="M33 48 Q38 44 46 47" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round" />
  <path d="M54 47 Q62 44 67 48" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round" />

  <!-- Mouth - fierce grin -->
  <path d="M36 66 Q50 78 64 66" stroke="#92400E" stroke-width="3" fill="#92400E" stroke-linecap="round" />
  <rect x="42" y="66" width="16" height="5" rx="1" fill="white" />

  <!-- Hard Hat -->
  <ellipse cx="50" cy="28" rx="26" ry="12" fill="#F59E0B" />
  <rect x="26" y="24" width="48" height="14" rx="2" fill="#F59E0B" />
  <rect x="22" y="36" width="56" height="6" rx="2" fill="#D97706" />
  <ellipse cx="50" cy="26" rx="16" ry="6" fill="#FCD34D" opacity="0.5" />

  <!-- Lightning bolt badge on hat - extra bright -->
  <path d="M52 20 L48 28 L52 28 L48 36 L56 26 L52 26 L56 20 Z" fill="#A3FF00"
    filter="url(#sparky-glow)" />

  <!-- Small embers floating -->
  <circle cx="18" cy="42" r="1.5" fill="#F97316" opacity="0.7" />
  <circle cx="82" cy="38" r="1.2" fill="#EF4444" opacity="0.6" />
  <circle cx="24" cy="25" r="1" fill="#FCD34D" opacity="0.8" />
  <circle cx="78" cy="22" r="1.3" fill="#F97316" opacity="0.6" />
  <circle cx="50" cy="2" r="1" fill="#FCD34D" opacity="0.7" />
</svg>
